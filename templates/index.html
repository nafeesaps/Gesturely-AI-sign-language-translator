<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gesturely | AI Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #06b6d4; --bg: #f8fafc; --text: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .hero { background: linear-gradient(135deg, var(--primary), #1e293b); color: white; padding: 80px 20px; text-align: center; border-radius: 0 0 40px 40px; }
        h1 { font-family: 'Poppins', sans-serif; font-size: 3.5em; margin: 0; background: linear-gradient(to right, #fff, #a5f3fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.3em; opacity: 0.9; margin-top: 15px; font-weight: 300; }
        .container { display: flex; justify-content: center; gap: 40px; padding: 60px 20px; flex-wrap: wrap; }
        .card { background: white; width: 280px; padding: 40px 30px; border-radius: 24px; text-align: center; text-decoration: none; color: var(--text); transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 25px rgba(0,0,0,0.1); border: 1px solid var(--accent); }
        .icon { font-size: 60px; margin-bottom: 25px; display: inline-block; background: #ecfeff; padding: 20px; border-radius: 50%; }
        h2 { font-family: 'Poppins', sans-serif; color: var(--primary); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Gesturely</h1>
        <p>Your intelligent companion for sign language translation.</p>
    </div>
    <div class="container">
        <a href="/sign_to_text" class="card">
            <span class="icon">📷</span>
            <h2>Sign to Text</h2>
            <p>Translate real-time hand gestures into text using AI vision.</p>
        </a>
        <a href="/text_to_sign" class="card">
            <span class="icon">⌨️</span>
            <h2>Text to Sign</h2>
            <p>Type any sentence and watch Gesturely translate it into signs.</p>
        </a>
    </div>
</body>
</html>
