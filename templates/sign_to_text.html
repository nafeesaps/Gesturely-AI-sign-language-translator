<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Gesturely Live</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:30px;
    background:#f8fafc;
    font-family:'Inter',sans-serif;
    text-align:center;
}

h1{
    font-family:'Poppins',sans-serif;
    color:#0f172a;
    margin-bottom:25px;
}

.video-box{
    background:white;
    display:inline-block;
    padding:15px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

img{
    width:720px;
    border-radius:15px;
}

.sentence-box{
    width:720px;
    margin:25px auto;
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    text-align:left;
}

.label{
    font-size:18px;
    font-weight:600;
    color:#334155;
    margin-bottom:10px;
}

.value{
    min-height:40px;
    padding:12px;
    background:#f1f5f9;
    border-radius:12px;
    font-size:22px;
    color:#0f172a;
    word-wrap:break-word;
}

.mode-box{
    width:720px;
    margin:15px auto;
    background:white;
    border-radius:20px;
    padding:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    font-size:18px;
    font-weight:600;
    color:#0f172a;
}

.buttons{
    margin-top:25px;
}

.btn{
    border:none;
    padding:12px 22px;
    margin:10px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
    font-weight:600;
}

.btn:hover{
    transform:translateY(-2px);
}

.letter-btn{
    background:#0f172a;
}

.word-btn{
    background:#0f172a;
}

.reset-btn{
    background:#0f172a;
}

.erase-btn{
    background:#0f172a;
}

.dashboard-btn{
    background:#0f172a;
}

</style>
</head>

<body>

<h1>Gesturely Live</h1>

<div class="video-box">
    <img src="{{ url_for('video_feed') }}">
</div>

<div class="mode-box">
    Current Mode:
    <span id="mode">Letter</span>
</div>

<div class="sentence-box">

    <div class="label">
        Sentence
    </div>

    <div class="value" id="sentence">
        -
    </div>

</div>

<div class="buttons">

    <button class="btn letter-btn" onclick="setMode('letter')">
        Letter Mode
    </button>

    <button class="btn word-btn" onclick="setMode('word')">
        Word Mode
    </button>

    <button class="btn erase-btn" onclick="eraseLastWord()">
        Erase Last Word
    </button>

    <button class="btn reset-btn" onclick="clearAll()">
        Reset
    </button>

    <button class="btn dashboard-btn" onclick="goDashboard()">
        Back to Dashboard
    </button>

</div>

<script>

function setMode(mode){

    fetch('/set_mode/' + mode)
    .then(response => response.json())
    .then(data => {

        document.getElementById("mode").innerText =
            data.mode;

    });

}

function clearAll(){

    fetch('/clear');

    document.getElementById("sentence").innerText = "-";

}

function eraseLastWord(){

    fetch('/erase_last')
    .then(response => response.json())
    .then(data => {

        document.getElementById("sentence").innerText =
            data.sentence || "-";

    });

}

function goDashboard(){

    window.location.href = "/";

}

function updateData(){

    fetch('/get_sentence')
    .then(response => response.json())
    .then(data => {

        document.getElementById("sentence").innerText =
            data.sentence || "-";

        document.getElementById("mode").innerText =
            data.mode;

    });

}

setInterval(updateData, 500);

</script>

</body>
</html>
