<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Gesturely - Text to Sign</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
text-align:center;
padding:50px;
background:#f8fafc;
color:#0f172a;
}

h1{
font-family:'Poppins',sans-serif;
}

.input-group{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:40px;
}

input{
padding:15px 25px;
font-size:18px;
border:2px solid #e2e8f0;
border-radius:12px;
width:300px;
outline:none;
}

input:focus{
border-color:#06b6d4;
box-shadow:0 0 0 4px rgba(6,182,212,0.1);
}

.action-btn{
padding:15px 35px;
font-size:18px;
font-weight:600;
background:linear-gradient(135deg,#06b6d4,#0f172a);
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

.action-btn:hover{
transform:scale(1.05);
}

#display-area{
background:white;
padding:30px;
border-radius:24px;
display:none;
box-shadow:0 20px 25px rgba(0,0,0,0.1);
}

#sign-image{
height:300px;
border-radius:16px;
border:3px solid #e2e8f0;
transition:opacity 0.3s;
}

.back-btn{
margin-top:40px;
padding:12px 30px;
background:white;
color:#0f172a;
text-decoration:none;
border-radius:12px;
font-weight:600;
display:inline-flex;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h1>Type to Translate</h1>

<div class="input-group">

<input type="text" id="textInput" placeholder="Type sentence here...">

<button class="action-btn" onclick="playSignLanguage()">Visualize</button>

</div>

<div id="display-area">

<img id="sign-image" src="">

</div>

<br>

<a href="/" class="back-btn">⬅ Back to Dashboard</a>

<script>

function playSignLanguage(){

let text=document.getElementById("textInput").value.toLowerCase().trim();
let words=text.split(" ");

let displayArea=document.getElementById("display-area");
let imgElement=document.getElementById("sign-image");

if(text.length===0){
alert("Please type something!");
return;
}

displayArea.style.display="inline-block";

let wordIndex=0;
let letterIndex=0;

function playNext(){

if(wordIndex>=words.length){

// STOP DISPLAY AFTER FINISH
imgElement.src="";
return;

}

let word=words[wordIndex];
let wordPath="/static/signs/"+word+".gif";

let img=new Image();
img.src=wordPath;

img.onload=function(){

imgElement.style.opacity=0;

setTimeout(()=>{
imgElement.src=wordPath;
imgElement.style.opacity=1;
},200);

wordIndex++;
letterIndex=0;

setTimeout(playNext,2000);

}

img.onerror=function(){

if(letterIndex<word.length){

let letter=word[letterIndex].toUpperCase();

imgElement.style.opacity=0;

setTimeout(()=>{
imgElement.src="/static/signs/"+letter+".jpeg";
imgElement.style.opacity=1;
},200);

letterIndex++;

setTimeout(playNext,1000);

}

else{

letterIndex=0;
wordIndex++;

setTimeout(playNext,1200);

}

}

}

playNext();

}

</script>

</body>
</html>
